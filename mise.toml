[tools]
zola = "latest"
python = "3.13"

[tasks.build]
description = "Build Tailwind CSS"
run = "./static/tailwindcss -i input.css -o static/style.css"

[tasks.fetch-orcid]
description = "Fetch publications from ORCID"
run = '''
ORCID_ID="${ORCID_ID:-0000-0003-1234-8293}" python3 scripts/fetch_orcid.py
'''

[tasks.build-site]
description = "Build the Zola site"
run = "zola build"
depends = ["build", "fetch-orcid"]

[tasks.serve]
description = "Serve the site locally"
run = "zola serve"

[tasks.clean]
description = "Clean build artifacts"
run = "rm -rf public"
